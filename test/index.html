<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>goodbye-ai-block Test</title>
<style>
  body { font-family: system-ui, sans-serif; background: #111; color: #ddd; padding: 24px; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.2rem; margin-bottom: 16px; }
  h2 { font-size: .95rem; margin: 20px 0 8px; color: #aaa; }
  .info { font-size: .8rem; color: #888; background: #1a1a1a; padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; }
  .pair { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0; }
  .pair img { border: 1px solid #333; border-radius: 4px; max-width: 250px; }
  .label { font-size: .7rem; color: #666; }
  .text-box { background: #1a1a1a; padding: 10px; border-radius: 6px; margin: 8px 0; font-family: monospace; font-size: .8rem; word-break: break-all; }
  #log { font-size: .75rem; color: #4ade80; margin-top: 16px; white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>goodbye-ai-block Test</h1>
  <div class="info">If the extension is active, obfuscated images and text below should auto-decode.</div>

  <h2>Image — default seed</h2>
  <div class="pair">
    <div><img id="orig1"><div class="label">Original</div></div>
    <div><img id="obf1"><div class="label">Obfuscated → auto-decode</div></div>
  </div>

  <h2>Image — seed: hello</h2>
  <div class="pair">
    <div><img id="orig2"><div class="label">Original</div></div>
    <div><img id="obf2"><div class="label">Obfuscated (needs matching seed)</div></div>
  </div>

  <h2>Text — default seed</h2>
  <div id="obfText1" class="text-box">Generating...</div>

  <h2>Text — seed: hello</h2>
  <div id="obfText2" class="text-box">Generating...</div>

  <div id="log"></div>

<script src="../web/obfuscator.js"></script>
<script>
  const log = document.getElementById('log');
  function addLog(msg) { log.textContent += msg + '\n'; }

  async function makeTestImage(text, c1, c2) {
    const c = document.createElement('canvas'); c.width = 200; c.height = 120;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 200, 120);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, 200, 120);
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    ctx.beginPath(); ctx.arc(150, 40, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(20, 70, 60, 30);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText(text, 20, 45);
    return c;
  }

  async function init() {
    try {
      const s1 = await makeTestImage('Test A', '#c084fc', '#1a1a2e');
      document.getElementById('orig1').src = s1.toDataURL();
      document.getElementById('obf1').src = (await AZ.obfuscate(s1, '')).toDataURL();
      addLog('✓ Image test 1 (default seed)');

      const s2 = await makeTestImage('Test B', '#f472b6', '#111');
      document.getElementById('orig2').src = s2.toDataURL();
      document.getElementById('obf2').src = (await AZ.obfuscate(s2, 'hello')).toDataURL();
      addLog('✓ Image test 2 (seed: hello)');

      document.getElementById('obfText1').textContent = await AZ.obfuscateText('This is a test message with default seed.', '');
      addLog('✓ Text test 1 (default seed)');

      document.getElementById('obfText2').textContent = await AZ.obfuscateText("This is a secret message with seed 'hello'.", 'hello');
      addLog('✓ Text test 2 (seed: hello)');

      addLog('\nDone. Extension should auto-decode the obfuscated items above.');
    } catch (e) { addLog('✗ Error: ' + e.message); }
  }
  init();
</script>
</body>
</html>
