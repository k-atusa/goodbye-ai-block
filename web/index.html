<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Zaiming — 이미지 난독화</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px;min-height:100vh}
  .wrap{max-width:960px;margin:0 auto}
  h1{text-align:center;font-size:1.4rem;margin-bottom:4px;color:#fff}
  .sub{text-align:center;font-size:.8rem;color:#888;margin-bottom:16px}
  #dropzone{border:2px dashed #555;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;background:#16213e;margin-bottom:12px;transition:border-color .2s}
  #dropzone.over{border-color:#e94560;background:#1a1a3e}
  #dropzone .hint{color:#888;font-size:.85rem}
  .ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
  input[type=text]{background:#16213e;border:1px solid #444;color:#fff;padding:7px 12px;border-radius:6px;font-size:.85rem;flex:1;min-width:120px}
  button{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:opacity .15s}
  button:hover{opacity:.85}
  button:disabled{opacity:.35;cursor:default}
  .btn-enc{background:#e94560;color:#fff}
  .btn-dec{background:#0f3460;color:#fff}
  .btn-dl{background:#533483;color:#fff}
  .btn-clear{background:#333;color:#aaa;font-size:.8rem}
  .status{text-align:center;font-size:.82rem;min-height:22px;padding:4px;color:#888}
  .status.err{color:#e94560}.status.ok{color:#4ecca3}
  #grid{display:flex;flex-direction:column;gap:6px}
  .item{background:#16213e;border-radius:6px;padding:10px}
  .item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
  .item-name{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .item-meta{font-size:.72rem;color:#888;white-space:nowrap}
  .item-badge{font-size:.7rem;padding:2px 6px;border-radius:3px;white-space:nowrap}
  .badge-signal{background:#0f3460;color:#7ec8e3}
  .badge-done{background:#1b4332;color:#4ecca3}
  .badge-err{background:#3d0000;color:#e94560}
  .badge-wait{background:#333;color:#888}
  .item-body{display:flex;align-items:center;gap:8px;overflow-x:auto}
  .item-body canvas{max-height:100px;max-width:180px;border-radius:3px;background:#0a0a1a;display:block}
  .arrow{color:#555;flex-shrink:0}
  .item-foot{display:flex;justify-content:flex-end;margin-top:6px;gap:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔒 Anti-Zaiming</h1>
  <p class="sub">이미지를 난독화하여 공유하고, 키로 복호화하세요 · 여러 파일 동시 처리 가능</p>

  <div id="dropzone" tabindex="0">
    <span class="hint">이미지를 드래그 / 클릭 / 붙여넣기 (여러 파일 가능)</span>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple hidden>

  <div class="ctrl">
    <input type="text" id="keyInput" placeholder="키 (비워두면 기본 키 사용)">
    <button class="btn-enc" id="btnEnc" disabled>전체 난독화</button>
    <button class="btn-dec" id="btnDec" disabled>전체 복호화</button>
    <button class="btn-dl" id="btnDlAll" style="display:none">전체 다운로드</button>
    <button class="btn-clear" id="btnClear" style="display:none">초기화</button>
  </div>
  <div class="status" id="status"></div>

  <div id="grid"></div>
</div>

<script src="obfuscator.js"></script>
<script>
(() => {
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const keyInput = document.getElementById('keyInput');
  const btnEnc = document.getElementById('btnEnc');
  const btnDec = document.getElementById('btnDec');
  const btnDlAll = document.getElementById('btnDlAll');
  const btnClear = document.getElementById('btnClear');
  const statusEl = document.getElementById('status');
  const grid = document.getElementById('grid');

  const items = [];
  const SUPPORTED_OUT = ['image/jpeg', 'image/png', 'image/webp'];

  // ---- File loading ----

  function addFiles(files) {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      const item = { file: f, name: f.name, type: f.type, srcCanvas: null, resultCanvas: null, status: 'loading', el: null };
      items.push(item);
      loadItem(item);
    }
    updateButtons();
  }

  function loadItem(item) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = img.width; c.height = img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        item.srcCanvas = c;
        item.status = 'loaded';
        AZ.detect(c).then(sig => {
          item.signal = sig;
          renderItem(item);
        });
        renderItem(item);
        updateButtons();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(item.file);
    renderItem(item);
  }

  // ---- Rendering ----

  function renderItem(item) {
    if (!item.el) {
      item.el = document.createElement('div');
      item.el.className = 'item';
      grid.appendChild(item.el);
    }
    const dims = item.srcCanvas ? `${item.srcCanvas.width}×${item.srcCanvas.height}` : '...';
    let badge = '';
    if (item.status === 'loading') badge = '<span class="item-badge badge-wait">로드 중</span>';
    else if (item.status === 'processing') badge = '<span class="item-badge badge-wait">처리 중…</span>';
    else if (item.status === 'done') badge = '<span class="item-badge badge-done">완료 ✓</span>';
    else if (item.status === 'error') badge = `<span class="item-badge badge-err">${item.errorMsg || '오류'}</span>`;
    else if (item.signal) badge = '<span class="item-badge badge-signal">AZ 감지됨</span>';

    item.el.innerHTML = `
      <div class="item-head">
        <span class="item-name" title="${item.name}">${item.name}</span>
        <span class="item-meta">${dims}</span>
        ${badge}
      </div>
      <div class="item-body">
        <div class="item-src"></div>
        ${item.resultCanvas ? '<span class="arrow">→</span><div class="item-result"></div>' : ''}
      </div>
      ${item.status === 'done' ? '<div class="item-foot"><button class="btn-dl btn-dl-item">다운로드</button></div>' : ''}
    `;

    // Attach canvases (can't do in innerHTML)
    if (item.srcCanvas) {
      const thumb = document.createElement('canvas');
      const scale = Math.min(180 / item.srcCanvas.width, 100 / item.srcCanvas.height, 1);
      thumb.width = item.srcCanvas.width * scale;
      thumb.height = item.srcCanvas.height * scale;
      thumb.getContext('2d').drawImage(item.srcCanvas, 0, 0, thumb.width, thumb.height);
      thumb.style.maxHeight = '100px';
      item.el.querySelector('.item-src').appendChild(thumb);
    }
    if (item.resultCanvas) {
      const thumb = document.createElement('canvas');
      const scale = Math.min(180 / item.resultCanvas.width, 100 / item.resultCanvas.height, 1);
      thumb.width = item.resultCanvas.width * scale;
      thumb.height = item.resultCanvas.height * scale;
      thumb.getContext('2d').drawImage(item.resultCanvas, 0, 0, thumb.width, thumb.height);
      thumb.style.maxHeight = '100px';
      item.el.querySelector('.item-result').appendChild(thumb);
    }

    // Download button
    const dlBtn = item.el.querySelector('.btn-dl-item');
    if (dlBtn) dlBtn.onclick = () => downloadItem(item);
  }

  function updateButtons() {
    const hasItems = items.some(i => i.status !== 'loading');
    const hasDone = items.some(i => i.status === 'done');
    btnEnc.disabled = btnDec.disabled = !hasItems;
    btnDlAll.style.display = hasDone ? '' : 'none';
    btnClear.style.display = items.length > 0 ? '' : 'none';
  }

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  // ---- Process ----

  async function processAll(mode) {
    btnEnc.disabled = btnDec.disabled = true;
    const key = keyInput.value;
    let done = 0, fail = 0;
    const total = items.filter(i => i.status !== 'loading').length;

    for (const item of items) {
      if (item.status === 'loading') continue;
      item.status = 'processing';
      item.resultCanvas = null;
      renderItem(item);
      setStatus(`처리 중… (${done + fail + 1}/${total})`, '');

      await new Promise(r => setTimeout(r, 10)); // yield for UI

      try {
        const t0 = performance.now();
        if (mode === 'encode') {
          item.resultCanvas = await AZ.obfuscate(item.srcCanvas, key);
        } else {
          item.resultCanvas = await AZ.deobfuscate(item.srcCanvas, key);
        }
        item.status = 'done';
        done++;
      } catch (e) {
        item.status = 'error';
        item.errorMsg = e.message;
        fail++;
      }
      renderItem(item);
    }

    const modeLabel = mode === 'encode' ? '난독화' : '복호화';
    if (fail === 0) setStatus(`${modeLabel} 완료: ${done}개`, 'ok');
    else setStatus(`${modeLabel}: ${done}개 성공, ${fail}개 실패`, fail > 0 ? 'err' : 'ok');
    updateButtons();
  }

  // ---- Download ----

  function getOutType(originalType) {
    return SUPPORTED_OUT.includes(originalType) ? originalType : 'image/png';
  }

  function getOutExt(type) {
    return { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/webp': '.webp' }[type] || '.png';
  }

  function downloadItem(item) {
    if (!item.resultCanvas) return;
    const outType = getOutType(item.type);
    const quality = outType === 'image/jpeg' ? 0.95 : undefined;

    // 원본 파일명 유지 (확장자가 다르면 맞게 교체)
    const outExt = getOutExt(outType);
    const baseName = item.name.replace(/\.[^.]+$/, '');
    const outName = baseName + outExt;

    item.resultCanvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = outName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    }, outType, quality);
  }

  async function downloadAll() {
    for (const item of items) {
      if (item.status !== 'done') continue;
      downloadItem(item);
      await new Promise(r => setTimeout(r, 300));
    }
  }

  // ---- Events ----

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('over'); addFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', () => { if (fileInput.files.length) addFiles(fileInput.files); fileInput.value = ''; });

  document.addEventListener('paste', (e) => {
    const items2 = e.clipboardData?.items;
    if (!items2) return;
    const files = [];
    for (const it of items2) { if (it.type.startsWith('image/')) files.push(it.getAsFile()); }
    if (files.length) addFiles(files);
  });

  btnEnc.addEventListener('click', () => processAll('encode'));
  btnDec.addEventListener('click', () => processAll('decode'));
  btnDlAll.addEventListener('click', downloadAll);
  btnClear.addEventListener('click', () => {
    items.length = 0;
    grid.innerHTML = '';
    btnDlAll.style.display = 'none';
    btnClear.style.display = 'none';
    btnEnc.disabled = btnDec.disabled = true;
    setStatus('', '');
  });
})();
</script>
</body>
</html>
