<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>goodbye-ai-block</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #ddd; padding: 32px 16px; min-height: 100vh; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 24px; color: #fff; }
  .seed-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .seed-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: .85rem; }
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; }
  .tab { background: #1a1a1a; border: 1px solid #333; border-bottom: none; color: #888; padding: 8px 20px; cursor: pointer; font-size: .85rem; border-radius: 6px 6px 0 0; transition: color .15s; }
  .tab.active { background: #222; color: #fff; border-color: #444; }
  .panel { display: none; background: #222; border: 1px solid #444; border-radius: 0 6px 6px 6px; padding: 20px; }
  .panel.active { display: block; }
  button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 600; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .3; cursor: default; }
  .btn-pri { background: #c084fc; color: #000; }
  .btn-sec { background: #333; color: #ccc; }
  #dropzone { border: 2px dashed #444; border-radius: 8px; padding: 36px 16px; text-align: center; cursor: pointer; color: #888; font-size: .85rem; margin-bottom: 16px; transition: border-color .2s; }
  #dropzone.over { border-color: #c084fc; }
  .ctrl { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .status { text-align: center; font-size: .8rem; min-height: 20px; color: #888; margin-bottom: 8px; }
  .status.err { color: #f87171; } .status.ok { color: #4ade80; }
  #grid { display: flex; flex-direction: column; gap: 6px; }
  .item { background: #1a1a1a; border-radius: 6px; padding: 10px; }
  .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
  .item-name { font-size: .8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .item-meta { font-size: .7rem; color: #666; }
  .item-badge { font-size: .65rem; padding: 2px 6px; border-radius: 3px; }
  .badge-sig { background: #1e293b; color: #7dd3fc; }
  .badge-done { background: #14532d; color: #4ade80; }
  .badge-err { background: #450a0a; color: #f87171; }
  .badge-wait { background: #262626; color: #888; }
  .item-body { display: flex; align-items: center; gap: 8px; overflow-x: auto; }
  .item-body canvas { max-height: 80px; max-width: 160px; border-radius: 3px; background: #000; }
  .arrow { color: #555; }
  .item-foot { display: flex; justify-content: flex-end; margin-top: 6px; gap: 6px; }
  .text-row { display: flex; gap: 12px; }
  .text-col { flex: 1; min-width: 0; }
  textarea { width: 100%; height: 180px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #eee; padding: 12px; font-family: monospace; font-size: .85rem; resize: vertical; }
  textarea:focus { outline: none; border-color: #555; }
  .text-ctrl { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
  @media (max-width: 600px) { .text-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>goodbye-ai-block</h1>
  <div class="seed-row">
    <input type="text" id="seedInput" placeholder="Seed (leave empty for default)">
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="img-panel">Image</div>
    <div class="tab" data-tab="txt-panel">Text</div>
  </div>

  <!-- image panel -->
  <div id="img-panel" class="panel active">
    <div id="dropzone">Drag / click / paste images</div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <div class="ctrl">
      <button class="btn-pri" id="btnConvert" disabled>Convert</button>
      <button class="btn-sec" id="btnDlAll" style="display:none">Download All</button>
      <button class="btn-sec" id="btnClear" style="display:none">Clear</button>
    </div>
    <div class="status" id="status"></div>
    <div id="grid"></div>
  </div>

  <!-- text panel -->
  <div id="txt-panel" class="panel">
    <div class="text-row">
      <div class="text-col"><textarea id="txtInput" placeholder="Plain text or AI!1(...) input"></textarea></div>
      <div class="text-col"><textarea id="txtOutput" placeholder="Result" readonly></textarea></div>
    </div>
    <div class="text-ctrl">
      <button class="btn-pri" id="btnTxtConvert">Convert</button>
      <button class="btn-sec" id="btnTxtCopy">Copy</button>
      <button class="btn-sec" id="btnTxtClear">Clear</button>
    </div>
    <div class="status" id="txtStatus"></div>
  </div>
</div>

<script src="obfuscator.js"></script>
<script>
(() => {
  // tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  const drop = document.getElementById('dropzone');
  const fileIn = document.getElementById('fileInput');
  const seedIn = document.getElementById('seedInput');
  const btnConvert = document.getElementById('btnConvert');
  const btnDlAll = document.getElementById('btnDlAll');
  const btnClear = document.getElementById('btnClear');
  const statusEl = document.getElementById('status');
  const grid = document.getElementById('grid');
  const items = [];
  const SUPPORTED = ['image/jpeg','image/png','image/webp'];

  function addFiles(files) {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      const item = { file: f, name: f.name, type: f.type, src: null, result: null, status: 'loading', el: null };
      items.push(item); loadItem(item);
    }
    updateUI();
  }

  function loadItem(item) {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = img.width; c.height = img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        item.src = c; item.status = 'ready';
        AZ.detect(c).then(sig => { item.signal = sig; render(item); });
        render(item); updateUI();
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(item.file); render(item);
  }

  function render(item) {
    if (!item.el) { item.el = document.createElement('div'); item.el.className = 'item'; grid.appendChild(item.el); }
    const dims = item.src ? `${item.src.width}×${item.src.height}` : '';
    let badge = '';
    if (item.status === 'loading') badge = '<span class="item-badge badge-wait">Loading</span>';
    else if (item.status === 'processing') badge = '<span class="item-badge badge-wait">Processing</span>';
    else if (item.status === 'done') badge = '<span class="item-badge badge-done">Done</span>';
    else if (item.status === 'error') badge = `<span class="item-badge badge-err">${item.err||'Error'}</span>`;
    else if (item.signal) badge = '<span class="item-badge badge-sig">Obfuscated</span>';
    item.el.innerHTML = `
      <div class="item-head"><span class="item-name" title="${item.name}">${item.name}</span><span class="item-meta">${dims}</span>${badge}</div>
      <div class="item-body"><div class="src"></div>${item.result?'<span class="arrow">→</span><div class="res"></div>':''}</div>
      ${item.status==='done'?'<div class="item-foot"><button class="btn-sec dl">Download</button></div>':''}`;
    if (item.src) { const t = thumb(item.src); item.el.querySelector('.src').appendChild(t); }
    if (item.result) { const t = thumb(item.result); item.el.querySelector('.res').appendChild(t); }
    const dl = item.el.querySelector('.dl'); if (dl) dl.onclick = () => downloadItem(item);
  }

  function thumb(cv) {
    const t = document.createElement('canvas');
    const s = Math.min(160/cv.width, 80/cv.height, 1);
    t.width = cv.width*s; t.height = cv.height*s;
    t.getContext('2d').drawImage(cv, 0, 0, t.width, t.height); return t;
  }

  function updateUI() {
    btnConvert.disabled = !items.some(i => i.status !== 'loading');
    btnDlAll.style.display = items.some(i => i.status === 'done') ? '' : 'none';
    btnClear.style.display = items.length ? '' : 'none';
  }

  function setStatus(msg, cls) { statusEl.textContent = msg; statusEl.className = 'status'+(cls?' '+cls:''); }

  // auto-detect: signal found → decode, else encode
  async function convertAll() {
    btnConvert.disabled = true;
    const seed = seedIn.value;
    let ok = 0, fail = 0;
    const total = items.filter(i => i.status !== 'loading').length;
    for (const item of items) {
      if (item.status === 'loading') continue;
      item.status = 'processing'; item.result = null; render(item);
      setStatus(`${ok+fail+1}/${total}`,'');
      await new Promise(r => setTimeout(r, 10));
      try {
        item.result = item.signal ? await AZ.deobfuscate(item.src, seed) : await AZ.obfuscate(item.src, seed);
        item.status = 'done'; ok++;
      } catch (e) { item.status = 'error'; item.err = e.message; fail++; }
      render(item);
    }
    setStatus(fail ? `${ok} done, ${fail} failed` : `Done: ${ok}`, fail ? 'err' : 'ok');
    updateUI();
  }

  function getExt(t) { return {['image/jpeg']:'.jpg',['image/png']:'.png',['image/webp']:'.webp'}[t]||'.png'; }

  function downloadItem(item) {
    if (!item.result) return;
    const t = SUPPORTED.includes(item.type) ? item.type : 'image/png';
    item.result.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = item.name.replace(/\.[^.]+$/,'') + getExt(t);
      a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    }, t, t==='image/jpeg' ? 0.95 : undefined);
  }

  async function downloadAll() {
    for (const item of items) { if (item.status==='done') { downloadItem(item); await new Promise(r=>setTimeout(r,300)); } }
  }

  drop.addEventListener('click', () => fileIn.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); addFiles(e.dataTransfer.files); });
  fileIn.addEventListener('change', () => { if (fileIn.files.length) addFiles(fileIn.files); fileIn.value=''; });
  document.addEventListener('paste', e => {
    const fs=[]; for (const it of (e.clipboardData?.items||[])) if (it.type.startsWith('image/')) fs.push(it.getAsFile());
    if (fs.length) addFiles(fs);
  });
  btnConvert.addEventListener('click', convertAll);
  btnDlAll.addEventListener('click', downloadAll);
  btnClear.addEventListener('click', () => { items.length=0; grid.innerHTML=''; btnDlAll.style.display='none'; btnClear.style.display='none'; btnConvert.disabled=true; setStatus(''); });

  // -- text panel --
  const txtIn = document.getElementById('txtInput');
  const txtOut = document.getElementById('txtOutput');
  const txtSt = document.getElementById('txtStatus');
  function setTxtSt(m,c) { txtSt.textContent=m; txtSt.className='status'+(c?' '+c:''); }

  // auto-detect: AI!1(...) → decode, else encode
  document.getElementById('btnTxtConvert').addEventListener('click', async () => {
    const val = txtIn.value.trim();
    if (!val) { setTxtSt('No input','err'); return; }
    try {
      const seed = seedIn.value;
      if (/AI!1\(/.test(val)) { txtOut.value = await AZ.deobfuscateText(val, seed); setTxtSt('Decoded','ok'); }
      else { txtOut.value = await AZ.obfuscateText(val, seed); setTxtSt('Encoded','ok'); }
    } catch (e) { setTxtSt(e.message,'err'); }
  });
  document.getElementById('btnTxtCopy').addEventListener('click', () => { navigator.clipboard.writeText(txtOut.value||txtIn.value).catch(()=>{}); });
  document.getElementById('btnTxtClear').addEventListener('click', () => { txtIn.value=''; txtOut.value=''; setTxtSt(''); });
})();
</script>
</body>
</html>
