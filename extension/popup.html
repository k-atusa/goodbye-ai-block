<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 260px; padding: 12px; font-family: system-ui, sans-serif; background: #1a1a1a; color: #ddd; font-size: 13px; }
  h2 { font-size: 14px; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  label { font-size: 12px; color: #aaa; }
  input[type=text] { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 12px; }
  button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-save { background: #333; color: #fff; }
  .btn-scan { background: #000; color: #fff; border: 1px solid #fff; width: 100%; }
  .btn-open { background: #c084fc; color: #000; width: 100%; margin-top: 6px; }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #444; border-radius: 10px; transition: .2s; }
  .toggle .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #4ade80; }
  .toggle input:checked + .slider::before { transform: translateX(16px); }
  .stats { font-size: 11px; color: #888; margin-top: 6px; text-align: center; }
  hr { border: none; border-top: 1px solid #333; margin: 8px 0; }
</style>
</head>
<body>
  <h2>goodbye-ai-block</h2>
  <div class="row">
    <label>Enabled</label>
    <label class="toggle"><input type="checkbox" id="toggleEnabled" checked><span class="slider"></span></label>
  </div>
  <div class="row">
    <input type="text" id="seedInput" placeholder="Seed (default if empty)">
    <button class="btn-save" id="btnSave">Save</button>
  </div>
  <hr>
  <button class="btn-scan" id="btnScan">Scan</button>
  <button class="btn-open" id="btnOpen">Open Converter</button>
  <div class="stats" id="stats">—</div>
<script src="popup.js"></script>
</body>
</html>
