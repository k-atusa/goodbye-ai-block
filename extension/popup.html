<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 280px; padding: 12px; font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
  h2 { font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  label { font-size: 12px; color: #aaa; }
  input[type=text] { flex: 1; background: #16213e; border: 1px solid #444; color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 12px; }
  button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-save { background: #0f3460; color: #fff; }
  .btn-scan { background: #e94560; color: #fff; width: 100%; }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #444; border-radius: 10px; transition: .2s; }
  .toggle .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #4ecca3; }
  .toggle input:checked + .slider::before { transform: translateX(16px); }
  .stats { font-size: 11px; color: #888; margin-top: 6px; text-align: center; }
  hr { border: none; border-top: 1px solid #333; margin: 8px 0; }
</style>
</head>
<body>
  <h2>🔒 Anti-Zaiming</h2>

  <div class="row">
    <label>활성화</label>
    <label class="toggle"><input type="checkbox" id="toggleEnabled" checked><span class="slider"></span></label>
  </div>

  <div class="row">
    <input type="text" id="keyInput" placeholder="키 (비워두면 기본 키)">
    <button class="btn-save" id="btnSave">저장</button>
  </div>

  <hr>
  <button class="btn-scan" id="btnScan">현재 페이지 스캔</button>
  <div class="stats" id="stats">—</div>

<script>
  const toggle = document.getElementById('toggleEnabled');
  const keyInput = document.getElementById('keyInput');
  const btnSave = document.getElementById('btnSave');
  const btnScan = document.getElementById('btnScan');
  const stats = document.getElementById('stats');

  // 설정 로드
  chrome.storage.sync.get({ enabled: true, key: '' }, (cfg) => {
    toggle.checked = cfg.enabled;
    keyInput.value = cfg.key;
  });

  // 토글
  toggle.addEventListener('change', () => {
    chrome.storage.sync.set({ enabled: toggle.checked });
  });

  // 키 저장
  btnSave.addEventListener('click', () => {
    chrome.storage.sync.set({ key: keyInput.value }, () => {
      btnSave.textContent = '✓';
      setTimeout(() => { btnSave.textContent = '저장'; }, 800);
    });
  });

  // 수동 스캔
  btnScan.addEventListener('click', () => {
    chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
      if (!tabs[0]) return;
      chrome.tabs.sendMessage(tabs[0].id, { type: 'manual-scan' }, (res) => {
        if (res) stats.textContent = `복호화된 이미지: ${res.count}개`;
        else stats.textContent = '응답 없음 (페이지 새로고침 필요)';
      });
    });
  });

  // 현재 상태 표시
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    if (!tabs[0]) return;
    chrome.tabs.sendMessage(tabs[0].id, { type: 'get-status' }, (res) => {
      if (res) stats.textContent = `복호화된 이미지: ${res.count}개`;
      else stats.textContent = '이 페이지에서 대기 중';
    });
  });
</script>
</body>
</html>
