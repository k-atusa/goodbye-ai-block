<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>goodbye-ai-block Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #ddd; padding: 24px; max-width: 480px; margin: 0 auto; }
  h1 { font-size: 1.2rem; margin-bottom: 20px; color: #fff; }
  .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: .85rem; color: #aaa; font-weight: 600; }
  input[type=text] { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: .85rem; }
  input[type=text]:focus { outline: none; border-color: #555; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; font-weight: 600; background: #c084fc; color: #000; }
  button:hover { opacity: .85; }
  .status { font-size: .8rem; color: #4ade80; margin-top: 8px; }
</style>
</head>
<body>
  <h1>goodbye-ai-block Settings</h1>
  <div class="check-row">
    <input type="checkbox" id="enabled">
    <label for="enabled">Auto-decode enabled</label>
  </div>
  <div class="row">
    <label for="seed">Seed</label>
    <input type="text" id="seed" placeholder="Seed for obfuscation/deobfuscation">
  </div>
  <button id="save">Save</button>
  <div id="status"></div>
<script src="options.js"></script>
</body>
</html>
